name: HardwareGrowler Release

on:
  push:
    tags:
      - "hardwaregrowler-v*"
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Existing tag to publish, for example hardwaregrowler-v1.0.0"
        required: true
        type: string
      prerelease:
        description: "Mark the GitHub release as a prerelease"
        required: false
        default: false
        type: boolean

jobs:
  release:
    name: Build and Publish
    runs-on: macos-15
    timeout-minutes: 20
    permissions:
      contents: write
      id-token: write
      attestations: write
      artifact-metadata: write

    steps:
      - name: Resolve release tag
        id: release-tag
        env:
          DISPATCH_TAG: ${{ inputs.tag_name }}
        run: |
          if [[ -n "${DISPATCH_TAG}" ]]; then
            tag_name="${DISPATCH_TAG}"
          else
            tag_name="${GITHUB_REF_NAME}"
          fi

          if [[ ! "${tag_name}" == hardwaregrowler-v* ]]; then
            echo "Release tags must start with hardwaregrowler-v" >&2
            exit 1
          fi

          version="${tag_name#hardwaregrowler-v}"

          echo "tag_name=${tag_name}" >> "${GITHUB_OUTPUT}"
          echo "version=${version}" >> "${GITHUB_OUTPUT}"

      - name: Check out repository
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.release-tag.outputs.tag_name }}
          fetch-depth: 0

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Verify HardwareGrowler build
        timeout-minutes: 10
        env:
          HWG_VERSION_OVERRIDE: ${{ steps.release-tag.outputs.version }}
        run: Extras/HardwareGrowler/Scripts/verify-build.sh

      - name: Package release artifacts
        timeout-minutes: 5
        run: Extras/HardwareGrowler/Scripts/package-local-release.sh all

      - name: Generate checksums
        run: |
          set -euo pipefail

          cd build/dist
          shasum -a 256 \
            HardwareGrowler-Universal2.zip \
            HardwareGrowler-Universal2.dmg \
            > HardwareGrowler-Universal2.sha256

          cat HardwareGrowler-Universal2.sha256

      - name: Generate artifact attestation
        uses: actions/attest@v4
        with:
          subject-checksums: build/dist/HardwareGrowler-Universal2.sha256

      - name: Generate release notes
        env:
          TAG_NAME: ${{ steps.release-tag.outputs.tag_name }}
        run: |
          set -euo pipefail

          notes_file="build/dist/release-notes.md"
          previous_tag="$(git tag --merged "${TAG_NAME}" --list "hardwaregrowler-v*" --sort=-creatordate | grep -v "^${TAG_NAME}$" | head -n 1 || true)"

          if [[ -n "${previous_tag}" ]]; then
            commit_range="${previous_tag}..${TAG_NAME}"
            compare_url="https://github.com/${GITHUB_REPOSITORY}/compare/${previous_tag}...${TAG_NAME}"
          else
            commit_range="${TAG_NAME}"
            compare_url="https://github.com/${GITHUB_REPOSITORY}/commits/${TAG_NAME}"
          fi

          version="${TAG_NAME#hardwaregrowler-v}"
          commit_limit=15

          {
            printf '# HardwareGrowler %s\n\n' "${version}"
            printf 'This release contains a Universal 2 HardwareGrowler build for macOS.\n\n'
            printf '## Artifacts\n\n'
            printf -- '- `HardwareGrowler-Universal2.zip`: ZIP archive containing `HardwareGrowler.app`. This is usually the easiest artifact to download and unpack.\n'
            printf -- '- `HardwareGrowler-Universal2.dmg`: compressed disk image containing `HardwareGrowler.app`. Use this if you prefer a mountable macOS disk image.\n\n'
            printf '## Checksums\n\n'
            printf '```text\n'
            cat build/dist/HardwareGrowler-Universal2.sha256
            printf '```\n\n'
            printf 'GitHub artifact attestations are generated for the ZIP and DMG so users can verify that the published artifacts came from this release workflow.\n\n'
            printf 'These artifacts are ad-hoc signed by CI and are not Apple-notarized. For normal use on your own Mac, see the HardwareGrowler README for local self-signing and Gatekeeper notes:\n\n'
            printf 'https://github.com/%s/blob/%s/Extras/HardwareGrowler/README.md#using-downloaded-release-artifacts\n\n' "${GITHUB_REPOSITORY}" "${TAG_NAME}"
            printf '## Changes\n\n'
            if [[ -n "${previous_tag}" ]]; then
              commit_count="$(git rev-list --count "${commit_range}")"
              if (( commit_count > commit_limit )); then
                printf '_Showing the latest %s of %s commits. See the full commit list below._\n\n' "${commit_limit}" "${commit_count}"
              fi

              git log --max-count="${commit_limit}" --pretty=format:'- %s ([%h](https://github.com/'"${GITHUB_REPOSITORY}"'/commit/%H))' "${commit_range}"
            else
              if git rev-parse "${TAG_NAME}~${commit_limit}" >/dev/null 2>&1; then
                base_ref="$(git rev-parse "${TAG_NAME}~${commit_limit}")"
                commit_range="${base_ref}..${TAG_NAME}"
                compare_url="https://github.com/${GITHUB_REPOSITORY}/compare/${base_ref}...${TAG_NAME}"
              fi

              commit_count="$(git rev-list --count "${commit_range}")"
              printf '_Initial automated HardwareGrowler release. Showing the %s commits that led to this build._\n\n' "${commit_count}"
              git log --max-count="${commit_limit}" --pretty=format:'- %s ([%h](https://github.com/'"${GITHUB_REPOSITORY}"'/commit/%H))' "${commit_range}"
            fi
            printf '\n\n## Full Commit List\n\n'
            printf '%s\n' "${compare_url}"
          } > "${notes_file}"

          cat "${notes_file}"

      - name: Publish GitHub release
        timeout-minutes: 5
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG_NAME: ${{ steps.release-tag.outputs.tag_name }}
          PRERELEASE: ${{ inputs.prerelease }}
        run: |
          set -euo pipefail

          version="${TAG_NAME#hardwaregrowler-v}"

          if [[ "${PRERELEASE}" == "true" ]]; then
            gh release create "${TAG_NAME}" \
              build/dist/HardwareGrowler-Universal2.zip \
              build/dist/HardwareGrowler-Universal2.dmg \
              build/dist/HardwareGrowler-Universal2.sha256 \
              --repo "${GH_REPO}" \
              --target "${GITHUB_SHA}" \
              --title "HardwareGrowler ${version}" \
              --notes-file build/dist/release-notes.md \
              --prerelease
          else
            gh release create "${TAG_NAME}" \
              build/dist/HardwareGrowler-Universal2.zip \
              build/dist/HardwareGrowler-Universal2.dmg \
              build/dist/HardwareGrowler-Universal2.sha256 \
              --repo "${GH_REPO}" \
              --target "${GITHUB_SHA}" \
              --title "HardwareGrowler ${version}" \
              --notes-file build/dist/release-notes.md
          fi
